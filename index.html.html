<style>

/* ─────────────────────────────────────
   BASE
───────────────────────────────────── */
*, *::before, *::after {
  margin: 0; padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --bg:   #ffffff;
  --ink:  #111111;
  --red:  #bb0000;
  --gray: #999999;
  --pale: #e0e0e0;
  --sans: 'Hiragino Kaku Gothic Pro', 'Helvetica Neue', sans-serif;
  --serif:'Hiragino Mincho Pro', 'Yu Mincho', serif;
}

html, body {
  width: 100%; height: 100%;
  background: var(--bg);
  overflow: hidden;
  font-family: var(--serif);
  touch-action: none;
}

body { display: flex; }

/* ─────────────────────────────────────
   GAME CONTAINER
───────────────────────────────────── */
#game {
  position: relative;
  width: 100%;
  height: 100%;
  background: var(--bg);
  overflow: hidden;
  flex: 1;
  user-select: none;
  -webkit-user-select: none;
}

/* ─────────────────────────────────────
   HUD
───────────────────────────────────── */
#hud {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  border-bottom: 1px solid var(--pale);
  background: var(--bg);
  z-index: 10;
}

.hud-center {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 1px;
}
.hud-right {
  justify-self: end;
  display: flex;
  align-items: center;
  gap: 14px;
}
.hud-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 1px;
}
.hud-label {
  font-family: var(--sans);
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--gray);
}
.hud-value {
  font-family: var(--sans);
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -1px;
  line-height: 1;
}
#hud-score {
  min-width: 6ch;
  text-align: center;
}
#combo-txt {
  font-family: var(--sans);
  font-size: 10px;
  color: var(--red);
  letter-spacing: 2px;
  min-height: 13px;
}
.mute-btn {
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 2px;
  color: var(--gray);
  background: transparent;
  border: 1px solid var(--pale);
  padding: 6px 10px;
  cursor: pointer;
  line-height: 1;
}
.mute-btn:active { opacity: .7; }

/* ─────────────────────────────────────
   ARENA (play field)
───────────────────────────────────── */
#arena {
  position: absolute;
  top: 52px; left: 0; right: 0; bottom: 44px;
  overflow: hidden;
  z-index: 2;
}

/* ─────────────────────────────────────
   PLAYER
───────────────────────────────────── */
#player {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 32px;
  font-weight: 900;
  color: var(--ink);
  line-height: 1;
  white-space: nowrap;
  z-index: 5;
}

/* danger trembles — no color change */
@keyframes tremble-lo {
  0%, 100% { transform: translateX(-50%) translate(0, 0); }
  25%       { transform: translateX(-50%) translate(-1px, 1px); }
  75%       { transform: translateX(-50%) translate(1px, -1px); }
}
@keyframes tremble-hi {
  0%, 100% { transform: translateX(-50%) translate(0, 0); }
  20%      { transform: translateX(-50%) translate(-2px, 2px); }
  50%      { transform: translateX(-50%) translate(2px, -1px); }
  80%      { transform: translateX(-50%) translate(-1px, 1px); }
}
#player.danger-lo { animation: tremble-lo .18s infinite; }
#player.danger-hi { animation: tremble-hi .10s infinite; }

/* ─────────────────────────────────────
   DROPS
───────────────────────────────────── */
.drop {
  position: absolute;
  transform: translateX(-50%);
  white-space: nowrap;
  line-height: 1;
  pointer-events: none;
  z-index: 4;
  font-weight: 900;
}
.drop.normal {
  font-size: 32px;
  color: var(--ink);
}
.drop.fast {
  font-family: var(--sans);
  font-size: 28px;
  color: var(--red);
}
.drop.item {
  width: 42px;
  height: 42px;
  opacity: 0.96;
  animation: item-float 1.8s ease-in-out infinite;
}

.item-image {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;
  filter: drop-shadow(0 0 6px rgba(255,255,255,.55));
}

@keyframes item-float {
  0%, 100% { transform: translateX(-50%) translateY(0); }
  50% { transform: translateX(-50%) translateY(-4px); }
}

.drop.track {
  font-size: 30px;
  color: var(--ink);
  text-decoration: underline;
  text-decoration-thickness: 2px;
  text-underline-offset: 3px;
}

/* ─────────────────────────────────────
   VFX
───────────────────────────────────── */
/* near-miss ring */
.ring {
  position: absolute;
  border: 1.5px solid rgba(0, 0, 0, .2);
  border-radius: 50%;
  pointer-events: none;
  z-index: 8;
  animation: ring-expand .5s ease-out forwards;
}
@keyframes ring-expand {
  from { width: 14px; height: 14px; opacity: .75; transform: translate(-50%, -50%); }
  to   { width: 90px; height: 90px; opacity: 0;   transform: translate(-50%, -50%); }
}

/* combo pop */
.combo-pop {
  position: absolute;
  font-family: var(--sans);
  font-size: 10px;
  font-weight: 700;
  color: var(--ink);
  pointer-events: none;
  z-index: 9;
  animation: pop-up 1s ease-out forwards;
}
@keyframes pop-up {
  from { opacity: 1; transform: translateY(0); }
  to   { opacity: 0; transform: translateY(-36px); }
}

.ring-cat {
  border-width: 2px;
  border-color: rgba(255, 255, 255, .92);
  box-shadow: 0 0 0 2px rgba(0,0,0,.06);
}
.ring-cat-full {
  animation: ring-expand-full .6s ease-out forwards;
}
@keyframes ring-expand-full {
  from { width: 18px; height: 18px; opacity: .9; transform: translate(-50%, -50%); }
  to   { width: 1200px; height: 1200px; opacity: 0; transform: translate(-50%, -50%); }
}

/* fast-drop warning flash */
#wflash {
  position: absolute;
  inset: 0;
  background: transparent;
  pointer-events: none;
  z-index: 12;
}
#wflash.active { animation: warn-flash .28s ease-out; }
@keyframes warn-flash {
  0%   { background: rgba(255, 255, 255, .22); }
  100% { background: transparent; }
}

/* danger border pulse */
@keyframes border-pulse {
  0%, 100% { box-shadow: inset 0 0 0 1px rgba(0, 0, 0, .07); }
  50%       { box-shadow: inset 0 0 0 3px rgba(0, 0, 0, .18); }
}
#game.danger-lo { animation: border-pulse .9s ease-in-out infinite; }
#game.danger-hi { animation: border-pulse .4s ease-in-out infinite; }

/* level flash */
.level-flash {
  position: absolute;
  top: 50%; left: 50%;
  font-family: var(--sans);
  font-size: 10px;
  letter-spacing: 6px;
  color: var(--ink);
  pointer-events: none;
  white-space: nowrap;
  z-index: 20;
}

/* gameover shake */
#game.shake { animation: game-shake .38s ease-out; }
@keyframes game-shake {
  0%, 100% { transform: translateX(0); }
  20%      { transform: translateX(-8px); }
  40%      { transform: translateX(7px); }
  60%      { transform: translateX(-4px); }
  80%      { transform: translateX(4px); }
}

/* ─────────────────────────────────────
   BOTTOM BAR (danger meter)
───────────────────────────────────── */
#bottom-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 44px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 12px;
  border-top: 1px solid var(--pale);
  background: var(--bg);
  z-index: 10;
}
#danger-label {
  font-family: var(--sans);
  font-size: 8px;
  color: var(--gray);
  letter-spacing: 2px;
  white-space: nowrap;
}
#danger-track {
  flex: 1;
  height: 2px;
  background: var(--pale);
}
#danger-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, #555, var(--red));
  transition: width .1s;
}

/* ─────────────────────────────────────
   SCREENS (title / gameover)
───────────────────────────────────── */
.screen {
  position: absolute;
  inset: 0;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px 20px;
  overflow-y: auto;
  overflow-x: hidden;
  z-index: 50;
}

.screen-inner {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 18px;
  margin: auto 0;
}

/* shared button */
.btn {
  margin-left: auto;
  margin-right: auto;
  font-family: var(--sans);
  font-size: 11px;
  letter-spacing: 4px;
  background: var(--ink);
  color: #fff;
  border: none;
  padding: 16px 44px;
  cursor: pointer;
  -webkit-appearance: none;
  transition: opacity .2s, transform .1s;
}
.btn:active { opacity: .75; transform: scale(.97); }

/* shared divider */
.divider {
  width: 28px;
  height: 1px;
  background: var(--pale);
}

#title-character {

#screen-title .btn,

<div id="game">

  <!-- HUD -->
  <div id="hud">

// ─────────────────────────────────────
//  AUDIO ENGINE
// ─────────────────────────────────────

let actx      = null;
let bgmMaster = null;
let bgmNodes  = [];
let bgmTimer  = null;
let bgmBeat   = 0;
let bgmLevel  = 1;

function getAudioCtx() {
  if (!actx) {
    actx = new (window.AudioContext || window.webkitAudioContext)();
    bgmMaster = actx.createGain();
    bgmMaster.gain.value = audio.muted ? 0 : 0.7;
    bgmMaster.connect(actx.destination);
  }
  return actx;
}

// one-shot tone for SFX
function playTone(freq, dur, type = 'sine', vol = 0.18) {
  if (audio.muted) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.start();
    osc.stop(ctx.currentTime + dur);
  } catch (e) {}
}

const sfx = {
  nearMiss: () => {
    playTone(850, .10, 'sine', .12);
    setTimeout(() => playTone(1150, .08, 'sine', .06), 65);
  },
  levelUp: () => {
    [480, 640, 800].forEach((f, i) => setTimeout(() => playTone(f, .18, 'triangle', .12), i * 70));
  },
  gameOver: () => {
    [340, 270, 210, 160].forEach((f, i) => setTimeout(() => playTone(f, .38, 'sawtooth', .22), i * 95));
  },
  catPickup: () => {
    playTone(520, .18, 'sine', .08);
    setTimeout(() => playTone(680, .22, 'triangle', .06), 70);
    setTimeout(() => playTone(820, .20, 'sine', .05), 140);
  },
};

function bgmStop() {
  if (bgmTimer) { clearTimeout(bgmTimer); bgmTimer = null; }
  bgmNodes.forEach(n => { try { n.stop(); } catch (e) {} });
  bgmNodes = [];
  bgmBeat = 0;
}

function bgmStart(lv) {
  bgmStop();
  bgmLevel = lv;
  try {
    const ctx = getAudioCtx();
    const cfg = BGM[lv] || BGM[1];

    // Continuous drone
    const drone = ctx.createOscillator();
    const droneGain = ctx.createGain();
    drone.type = 'sine';
    drone.frequency.value = cfg.drone;
    droneGain.gain.value = 0.18;
    drone.connect(droneGain);
    droneGain.connect(bgmMaster);
    drone.start();
    bgmNodes.push(drone);

    // Rhythmic melody
    function tick() {
      if (!state.running) return;
      const c   = BGM[bgmLevel] || BGM[1];
      const ctx2 = getAudioCtx();
      const step = bgmBeat % 8;

      // Rest on odd beats at low levels; all beats at lv5+
      let freq = null;
      if (step % 2 === 0 || bgmLevel >= 5) {
        freq = c.notes[Math.floor(Math.random() * c.notes.length)];
        if (bgmLevel >= 8 && step === 3) freq *= 1.055; // slight dissonance
      }

      if (freq) {
        const osc  = ctx2.createOscillator();
        const gain = ctx2.createGain();
        const noteDur = (60000 / c.bpm * 0.55) / 1000;
        const vol = WAVE_VOL[c.wave] ?? 0.15;
        osc.type = c.wave;
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(vol, ctx2.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx2.currentTime + noteDur);
        osc.connect(gain);
        gain.connect(bgmMaster);
        osc.start();
        osc.stop(ctx2.currentTime + noteDur + 0.05);
      }

      bgmBeat++;
      bgmTimer = setTimeout(tick, 60000 / c.bpm);
    }
    tick();
  } catch (e) {}
}

function bgmSwitch(newLv) {
  try {
    const ctx = getAudioCtx();
    bgmMaster.gain.setTargetAtTime(0, ctx.currentTime, 0.3);
    setTimeout(() => {
      bgmMaster.gain.setTargetAtTime(audio.muted ? 0 : 0.7, ctx.currentTime, 0.5);
      bgmStart(newLv);
    }, 400);
  } catch (e) {
    bgmStart(newLv);
  }
}

const storage = {
  getRank() {
    try { return JSON.parse(localStorage.getItem('kari_score_rank') || '[]'); } catch { return []; }

  saveRank(a) {
    try { localStorage.setItem('kari_score_rank', JSON.stringify(a)); } catch {}

  pushRank(score) {
    const a = this.getRank();
    a.push(score);
    a.sort((a, b) => b - a);
    const top = a.slice(0, 5);
    this.saveRank(top);
    return { scores: top, newIdx: top.indexOf(score) };
  },
  getStats() {
    try { return JSON.parse(localStorage.getItem('kari_stats') || '{"plays":0,"dodges":0}'); } catch { return { plays: 0, dodges: 0 }; }
  },
  saveStats(s) {
    try { localStorage.setItem('kari_stats', JSON.stringify(s)); } catch {}
  },
};

// ─────────────────────────────────────
//  UTILITIES
// ─────────────────────────────────────

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function rand(a, b)        { return a + Math.random() * (b - a); }
function pick(arr)         { return arr[Math.floor(Math.random() * arr.length)]; }

function pickAvoid(arr) {
  if (arr.length <= 1) return arr[0];
  let n;
  do { n = pick(arr); } while (n === state.lastDropName);
  return n;
}

// ─────────────────────────────────────
//  START GAME
// ─────────────────────────────────────

function startGame() {
  // clean up previous run
  state.drops.forEach(d => d.el.remove());
  state.drops = [];
  $arena.querySelectorAll('.ring,.combo-pop,.level-flash').forEach(e => e.remove());

  // reset state
  Object.assign(state, {
    px: GW / 2, tx: GW / 2,
    running: true,
    t0: 0, lastTs: 0, elapsed: 0, score: 0,
    level: 1, prevLevel: 1,
    danger: 0, combo: 0, dodges: 0,
    spawnCooldown: 0, hitName: '', lastDropName: '',
    introActive: true, introCleared: false, levelTimerBase: 0,
  });

  // reset UI
  $player.style.left = state.px + 'px';
  $player.className = '';
  $dangerFill.style.width = '0%';
  $hudLevel.textContent = 'LEVEL 1';
  $hudScore.textContent = '0';
  $comboTxt.textContent = '';
  $game.className = '';
  $screenTitle.style.display    = 'none';
  $screenGameover.style.display = 'none';

  if (state.rafId) cancelAnimationFrame(state.rafId);
  state.rafId = requestAnimationFrame(loop);
  bgmStart(1);
}

// ─────────────────────────────────────
//  GAME LOOP
// ─────────────────────────────────────

function loop(ts) {
  if (!state.running) return;
  if (!state.t0) { state.t0 = ts; state.lastTs = ts; }

  const dt = Math.min(ts - state.lastTs, 50);
  state.lastTs = ts;
  state.elapsed = (ts - state.t0) / 1000;

  updateLevel(dt);
  updateScore(dt);
  updatePlayer(dt);
  updateDrops(dt);
  updateDanger();

  state.rafId = requestAnimationFrame(loop);
}

function updateLevel() {
  if (state.introActive) {
    state.level = 1;
    $hudLevel.textContent = 'LEVEL 1';
    return;
  }

  const effectiveElapsed = Math.max(0, state.elapsed - state.levelTimerBase);
  const lv = clamp(2 + Math.floor(effectiveElapsed / 3.5), 2, 20);
  state.level = lv;

  if (lv !== state.prevLevel) {
    state.prevLevel = lv;
    sfx.levelUp();
    bgmSwitch(lv);
    showLevelFlash(lv);
  }

  $hudLevel.textContent = 'LEVEL ' + lv;
}

function updateScore(dt) {
  state.score += (state.level * 10) * (dt / 1000);
  $hudScore.textContent = Math.floor(state.score).toLocaleString('ja-JP');
}

function updatePlayer(dt) {
  const ks = 5 + state.level * 0.3;
  if (keys['ArrowLeft']  || keys['a'] || keys['A']) { const half = $player.offsetWidth / 2; state.tx = clamp(state.tx - ks, half, $arena.clientWidth - half); }
  if (keys['ArrowRight'] || keys['d'] || keys['D']) { const half = $player.offsetWidth / 2; state.tx = clamp(state.tx + ks, half, $arena.clientWidth - half); }
  state.px += (state.tx - state.px) * 0.18;
  $player.style.left = state.px + 'px';
}

function updateDrops(dt) {
  const spd = (1.8 + state.level * 0.26) * dt / 16;
  const si  = Math.max(200, 1900 - state.level * 85);

  state.spawnCooldown -= dt;
  if (state.spawnCooldown <= 0) {
    if (state.introActive) {
      if (state.drops.length === 0 && !state.introCleared) {
        spawnDrop();
      }
      state.spawnCooldown = 999999;
    } else {
      spawnDrop();
      state.spawnCooldown = si * (0.75 + Math.random() * 0.5);
    }
  }

  const pcy = AH - P_BOT - PH / 2;
  let closest = Infinity;

  for (let i = state.drops.length - 1; i >= 0; i--) {
    const d = state.drops[i];

    d.vx *= 0.92; d.vy *= 0.92;
    d.x += d.vx;
    d.y += spd * d.speed + d.vy;
    if (d.type === TYPE.TRACK) {
      d.x += (state.px - d.x) * 0.003 * dt / 16;
    }
    d.el.style.left = d.x + 'px';
    d.el.style.top  = d.y + 'px';

    const hw = d.el.offsetWidth / 2;
    const dh = d.el.offsetHeight;
    const hit = (
      d.x + hw > state.px - PW / 2 &&
      d.x - hw < state.px + PW / 2 &&
      d.y + dh > pcy - PH / 2 &&
      d.y       < pcy + PH / 2
    );
    if (hit) {
      if (d.type === TYPE.ITEM) {
        applyCatEffect(d.x, d.y);
        d.el.remove();
        state.drops.splice(i, 1);
        continue;
      }
      state.hitName = d.name;
      doGameOver();
      return;
    }

    closest = Math.min(closest, Math.hypot(d.x - state.px, (d.y + dh / 2) - pcy));

    if (d.y > AH + 60) {
      state.dodges++;
      const cx = Math.abs(d.x - state.px) < 100;
      const cy = Math.abs((d.y + dh / 2) - pcy) < 80;
      if (cx && cy) onNearMiss(d.x, pcy);

      const clearedFirst = !!d.isFirst;

      d.el.remove();
      state.drops.splice(i, 1);

      if (clearedFirst && state.introActive) {
        state.introActive = false;
        state.introCleared = true;
        state.level = 2;
        state.prevLevel = 1;
        state.levelTimerBase = state.elapsed;
        sfx.levelUp();
        bgmSwitch(2);
        showLevelFlash(2);
        $hudLevel.textContent = 'LEVEL 2';
        state.spawnCooldown = 0;
      }
    }
  }

  state._closest = closest;
}

function updateDanger() {
  const closest = state._closest ?? Infinity;
  const target = closest < 180 ? clamp((180 - closest) / 1.7, 0, 100) : 0;
  state.danger += (target - state.danger) * 0.07;

  $dangerFill.style.width = clamp(state.danger, 0, 100) + '%';
  $game.classList.toggle('danger-lo', state.danger > 30);
  $game.classList.toggle('danger-hi', state.danger > 65);
  $player.classList.toggle('danger-lo', state.danger > 30);
  $player.classList.toggle('danger-hi', state.danger > 65);
}

// ─────────────────────────────────────
//  SPAWN
// ─────────────────────────────────────

function spawnDrop() {
  let type, name, speed;
  let isFirst = false;

  if (state.introActive && !state.introCleared && state.drops.length === 0) {
    type = TYPE.NORMAL;
    name = pickAvoid(NAMES.normal);
    speed = 1.0;
    isFirst = true;
  } else {
    const r = Math.random();

    // Cat item (rare)
    if (!state.introActive && r < 0.08) {
      type = TYPE.ITEM;
      name = 'ねこ';
      speed = 0.8;
    }
    else if (state.level >= 6 && r < 0.20) {
      type = TYPE.TRACK;
      name = pickAvoid(NAMES.track);
      speed = 0.80;
    } else if (state.level >= 2 && r < 0.35) {
      type = TYPE.FAST;
      name = pickAvoid(NAMES.fast);
      speed = 2.6;
      triggerWarnFlash();
    } else {
      type = TYPE.NORMAL;
      name = pickAvoid(NAMES.normal);
      speed = 1.0;
    }
  }

  state.lastDropName = name;

  const margin = 48;
  const x = rand(margin, GW - margin);
  const y = -65;

  const el = document.createElement('div');
  el.className = 'drop ' + type;

// ─────────────────────────────────────
//  EFFECTS
// ─────────────────────────────────────

function applyCatEffect(px, py) {
  let affected = 0;

  state.drops.forEach(d => {
    if (d.type === TYPE.ITEM) return;

    const dx = d.x - state.px;
    const dist = Math.max(1, Math.abs(dx));
    const dir = dx >= 0 ? 1 : -1;
    const force = Math.max(18, 52 - dist * 0.08);

    d.vx += dir * force;
    d.vy -= 6;
    d.speed *= 0.45;
    affected++;

    setTimeout(() => {
      d.speed /= 0.45;
    }, 700);
  });

  sfx.catPickup();

  const ring = document.createElement('div');
  ring.className = 'ring ring-cat ring-cat-full';
  ring.style.left = state.px + 'px';
  ring.style.top  = (AH - P_BOT - PH / 2) + 'px';
  $arena.appendChild(ring);
  ring.addEventListener('animationend', () => ring.remove());

  $wflash.classList.remove('active');
  void $wflash.offsetWidth;
  $wflash.classList.add('active');
}

function triggerWarnFlash() {
  $wflash.classList.remove('active');
  void $wflash.offsetWidth; // reflow
  $wflash.classList.add('active');
}

function onNearMiss(x, cy) {
  sfx.nearMiss();
  state.combo++;
  $comboTxt.textContent = state.combo >= 2 ? state.combo + 'コンボ' : '';

  // ring animation
  const ring = document.createElement('div');
  ring.className = 'ring';
  ring.style.left = x + 'px';
  ring.style.top  = cy + 'px';
  $arena.appendChild(ring);
  ring.addEventListener('animationend', () => ring.remove());

  // combo pop text
  if (state.combo >= 3) {
    const pop = document.createElement('div');
    pop.className = 'combo-pop';
    pop.textContent = '×' + state.combo + ' 無名';
    pop.style.left = (x - 20) + 'px';
    pop.style.top  = (cy - 30) + 'px';
    $arena.appendChild(pop);
    pop.addEventListener('animationend', () => pop.remove());
  }
}

function showLevelFlash(lv) {
  const el = document.createElement('div');
  el.className = 'level-flash';
  el.textContent = 'LEVEL ' + lv;
  $arena.appendChild(el);
  el.animate(
    [
      { opacity: 0,   transform: 'translate(-50%, -50%) scale(.9)'  },
      { opacity: 0.7, transform: 'translate(-50%, -50%) scale(1)'   },
      { opacity: 0,   transform: 'translate(-50%, -50%) scale(1.08)' },
    ],
    { duration: 900, easing: 'ease-out' }
  ).onfinish = () => el.remove();
}

// ─────────────────────────────────────
//  GAME OVER
// ─────────────────────────────────────

function doGameOver() {
  state.running = false;
  bgmStop();
  sfx.gameOver();
  setTimeout(() => playTone(180, 1.1, 'sine', 0.035), 220);

  $game.classList.add('shake');
  $game.addEventListener('animationend', () => $game.classList.remove('shake'), { once: true });

  // fill gameover screen
  const seconds = Math.floor(state.elapsed);
  const finalScore = Math.floor(state.score);
  $goConcept.textContent = state.hitName;
  $goScore.textContent   = finalScore.toLocaleString('ja-JP');
  $goMessage.textContent = GO_MSG[state.hitName] || 'に魅了されました';

  // ranking
  const { scores, newIdx } = storage.pushRank(finalScore);
  $rankList.innerHTML = scores
    .map((v, i) => `<div class="rank-entry${i === newIdx ? ' highlight' : ''}">${i + 1}位　${v.toLocaleString('ja-JP')}pt</div>`)
    .join('');

  setTimeout(() => { $screenGameover.style.display = 'flex'; }, 480);
}
</script>
